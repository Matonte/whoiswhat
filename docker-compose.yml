services:
  whoiswhat:
    build: .
    image: flask-sample/whoiswhat:dev
    command: python run.py
    environment:
      FLASK_DEBUG: "1"
      HOST: "0.0.0.0"
      PORT: "5000"
      DATABASE_URL: "sqlite:////data/whoiswhat/whoiswhat.db"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.4-mini}"
      WHOISWHAT_MODEL: "${WHOISWHAT_MODEL:-}"
    ports:
      - "5001:5000"
    volumes:
      - whoiswhat_db:/data/whoiswhat
      - ./data/raw:/app/data/raw:ro

  whoishoss:
    build: .
    image: flask-sample/whoishoss:dev
    command: python run_whoishoss.py
    environment:
      FLASK_DEBUG: "1"
      PORT: "5002"
      HOSS_DATABASE_URL: "sqlite:////data/whoishoss/whoishoss.db"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.4-mini}"
      WHOISHOSS_MODEL: "${WHOISHOSS_MODEL:-}"
    ports:
      - "5002:5002"
    volumes:
      - whoishoss_db:/data/whoishoss
      - ./data/hoss:/app/data/hoss:ro

  meeting_advisor:
    build: .
    image: flask-sample/meeting_advisor:dev
    command: python run_meeting_advisor.py
    environment:
      FLASK_DEBUG: "1"
      PORT: "5003"
      ADVISOR_DATABASE_URL: "sqlite:////data/meeting_advisor/meeting_advisor.db"
      WHOISWHAT_URL: "http://whoiswhat:5000"
      WHOISHOSS_URL: "http://whoishoss:5002"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.4-mini}"
      ADVISOR_MODEL: "${ADVISOR_MODEL:-gpt-5.4}"
    ports:
      - "5003:5003"
    volumes:
      - advisor_db:/data/meeting_advisor
    depends_on:
      - whoiswhat
      - whoishoss

  portal:
    build:
      context: ./portal
    image: flask-sample/portal:dev
    ports:
      - "5173:80"
    depends_on:
      - whoiswhat
      - whoishoss
      - meeting_advisor

volumes:
  whoiswhat_db:
  whoishoss_db:
  advisor_db:
