server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location /api/whoiswhat/ {
    proxy_pass http://whoiswhat:5000/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }

  location /api/whoishoss/ {
    proxy_pass http://whoishoss:5002/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }

  location /api/advisor/ {
    proxy_pass http://meeting_advisor:5003/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
